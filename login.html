<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuFlow - 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #1b4d3e;
            text-align: center;
            margin-bottom: 8px;
        }

        .logo-sub {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .card {
            background: #ffffff;
            padding: 36px 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #1b4d3e;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Malgun Gothic', sans-serif;
            color: #333;
            background: #f8f9fa;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #1b4d3e;
            background: #ffffff;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: #1b4d3e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            font-family: 'Malgun Gothic', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #163d31;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #bbb;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e9ecef;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #1b4d3e;
            border: 1px solid #1b4d3e;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Malgun Gothic', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background-color: #e8f5e9;
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-top: 20px;
        }

        .footer-text a {
            color: #1b4d3e;
            font-weight: bold;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .error-msg {
            font-size: 12px;
            color: #d9534f;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">DuFlow</div>
        <div class="logo-sub">스마트한 팀 과제 관리 플랫폼</div>

        <div class="card">
            <div class="card-title">로그인</div>

            <div class="form-group">
                <label for="userId">아이디</label>
                <input type="text" id="userId" placeholder="아이디를 입력하세요">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력하세요">
                <div class="error-msg" id="errorMsg">아이디 또는 비밀번호를 확인해주세요.</div>
            </div>

            <button class="btn-primary" onclick="doLogin()">로그인</button>

            <div class="divider">또는</div>

            <button class="btn-secondary" onclick="location.href='register.html'">회원가입</button>
        </div>

        <div class="footer-text">
            계정이 없으신가요? <a href="register.html">회원가입하기</a>
        </div>

    </div>

    <script>
        function doLogin() {
            const id = document.getElementById('userId').value.trim();
            const pw = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!id || !pw) {
                errorMsg.style.display = 'block';
                return;
            }

            // 저장된 회원 정보 확인
            const users = JSON.parse(localStorage.getItem('duflow_users') || '[]');
            const matched = users.find(u => u.id === id && u.password === pw);

            if (matched) {
                localStorage.setItem('duflow_loggedIn', 'true');
                localStorage.setItem('duflow_currentUser', matched.name);
                localStorage.setItem('duflow_currentRole', matched.role === 'professor' ? '교수' : '학생');
                errorMsg.style.display = 'none';
                location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        // 엔터키로 로그인
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        // 이미 로그인된 경우 홈으로
        if (localStorage.getItem('duflow_loggedIn') === 'true') {
            location.href = 'index.html';
        }
    </script>

</body>
</html>
