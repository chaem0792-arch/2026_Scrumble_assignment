<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuFlow - 성적 확인</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:#f7f8f7;
    display:flex;
}

.sidebar{
    width:280px;
    height:100vh;
    background:white;
    border-right:1px solid #e5e7eb;
    padding:25px 15px;
    position:fixed;
}

.logo{
    font-size:40px;
    font-weight:700;
    color:#134e4a;
    margin-bottom:30px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu a{
    text-decoration:none;
    color:#333;
    padding:14px 18px;
    border-radius:12px;
    font-size:18px;
}

.menu a.active{
    background:#e8f5ea;
    color:#14532d;
    font-weight:600;
}

.main{
    margin-left:280px;
    width:calc(100% - 280px);
    padding:40px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:42px;
    color:#1f2937;
}

.profile{
    font-size:30px;
}

.card{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
}

.top-controls{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

select{
    padding:12px 18px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:16px;
}

.download-btn{
    background:#e8f5ea;
    color:#14532d;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.stat{
    background:#f9fafb;
    border-radius:18px;
    padding:25px;
    text-align:center;
}

.stat h3{
    color:#6b7280;
    font-size:15px;
    margin-bottom:10px;
}

.stat p{
    color:#166534;
    font-size:36px;
    font-weight:700;
}

.table-card{
    margin-top:25px;
}

.table-title{
    font-size:24px;
    font-weight:700;
    color:#14532d;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#eef7ef;
}

th,td{
    padding:18px;
    text-align:left;
}

th{
    color:#14532d;
}

tbody tr{
    border-bottom:1px solid #ececec;
}

tbody tr:hover{
    background:#fafafa;
}

.grade-a{
    color:#16a34a;
    font-weight:700;
}

.grade-b{
    color:#f59e0b;
    font-weight:700;
}

.notice{
    margin-top:20px;
    background:#eef7ef;
    color:#14532d;
    padding:18px;
    border-radius:14px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">DuFlow</div>

    <div class="menu">
        <a href="#">🏠 홈</a>
        <a href="#">📋 내 과제</a>
        <a href="#">👥 팀 프로젝트</a>
        <a href="#">📚 과제 자동 분류</a>
        <a href="#">📁 제출함</a>
        <a href="#">🗓️ 캘린더</a>
        <a href="#">👨‍🏫 교수 소개</a>
        <a class="active" href="#">📊 성적 확인</a>
        <a href="#">🎥 화상회의</a>
        <a href="#">⚙️ 설정</a>
    </div>
</div>

<div class="main">

    <div class="header">
        <h1>성적 확인</h1>
        <div class="profile">🔔 ✉️ 👤</div>
    </div>

    <div class="card">

        <div class="top-controls">
            <select>
                <option>2026-1학기</option>
                <option>2025-2학기</option>
                <option>2025-1학기</option>
            </select>

            <button class="download-btn">
                성적표 다운로드
            </button>
        </div>

        <div class="stats">
            <div class="stat">
                <h3>평균 평점</h3>
                <p>4.32</p>
            </div>

            <div class="stat">
                <h3>취득 학점</h3>
                <p>18</p>
            </div>

            <div class="stat">
                <h3>총 이수 학점</h3>
                <p>72</p>
            </div>

            <div class="stat">
                <h3>석차</h3>
                <p>12</p>
            </div>
        </div>

        <div class="table-card">

            <div class="table-title">
                📊 과목별 성적
            </div>

            <table>

                <thead>
                <tr>
                    <th>과목명</th>
                    <th>교수명</th>
                    <th>학점</th>
                    <th>등급</th>
                    <th>평점</th>
                    <th>구분</th>
                </tr>
                </thead>

                <tbody>
                <tr>
                    <td>국어교육론</td>
                    <td>김교수</td>
                    <td>3</td>
                    <td class="grade-a">A+</td>
                    <td>4.5</td>
                    <td>전공</td>
                </tr>

                <tr>
                    <td>교육공학</td>
                    <td>박교수</td>
                    <td>3</td>
                    <td class="grade-a">A0</td>
                    <td>4.0</td>
                    <td>전공</td>
                </tr>

                <tr>
                    <td>교육심리학</td>
                    <td>이교수</td>
                    <td>3</td>
                    <td class="grade-b">B+</td>
                    <td>3.5</td>
                    <td>전공</td>
                </tr>

                <tr>
                    <td>교직실무</td>
                    <td>최교수</td>
                    <td>3</td>
                    <td class="grade-a">A+</td>
                    <td>4.5</td>
                    <td>전공</td>
                </tr>
                </tbody>

            </table>

            <div class="notice">
                성적은 최종 확정 전까지 변경될 수 있습니다.
            </div>

        </div>

    </div>

</div>

</body>
</html>
